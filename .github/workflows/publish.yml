name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # create GitHub releases + push version commits
      issues: write        # comment on referenced issues
      pull-requests: write # comment on referenced PRs
      id-token: write      # npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for semantic-release commit analysis

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: npm install -g npm@latest  # trusted publishing requires npm 11.5.1+

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
